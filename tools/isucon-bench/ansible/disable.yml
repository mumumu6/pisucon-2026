---
- name: ホスト監視を停止する
  hosts: all
  become: true
  tasks:
    - name: Netdataを停止・自動起動を無効にする
      ansible.builtin.systemd:
        name: "{{ netdata_service }}"
        state: stopped
        enabled: false

- name: MySQLのslow query logを無効にする
  hosts: db
  become: true
  tasks:
    - name: スロークエリログを停止する
      ansible.builtin.command:
        argv:
          - "{{ mysql_admin_command }}"
          - "--execute=SET GLOBAL slow_query_log='OFF';"
      changed_when: true
