all:
  children:
    # 同じホストを複数グループに入れてよい。
    # 1台構成: 全グループに同じホスト
    # 3台構成: 役割ごとに分ける
    #
    # private_ip はメモ用。分離時は server-config の nginx / env.sh の MYSQL_HOST を手で直す。
    app:
      hosts:
        isucon-1:
          ansible_host: YOUR_PUBLIC_IP_1
          private_ip: 10.0.0.1
    db:
      hosts:
        isucon-1:
          # 2台目があるときだけ isucon-2 に分ける
          # ansible_host: YOUR_PUBLIC_IP_2
          # private_ip: 10.0.0.2
    nginx:
      hosts:
        isucon-1:
    # ベンチ案内・スコア入力・レポート基準（ちょうど1台）
    reporter:
      hosts:
        isucon-1:
