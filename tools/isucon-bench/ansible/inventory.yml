all:
  children:
    # 役割グループ。同じホストを複数グループに入れてよい。
    # 1台構成: 全グループに同じホスト / 3台構成: 役割ごとに分ける
    #
    # private_ip はサーバ間通信用のメモ。ホスト分離時は server-config/ の nginx 設定や
    # env.sh の MYSQL_HOST をこの値で手で直す（Ansible は自動では書き換えない）。
    # MariaDB は常に 0.0.0.0 待受 + リモート GRANT（構成によらない）
    app:
      hosts:
        isucon-1:
          ansible_host: 13.115.78.34
          private_ip: 10.0.0.137
    db:
      hosts:
        isucon-2:
          ansible_host: 175.41.223.208
          private_ip: 10.0.0.207
    nginx:
      hosts:
        isucon-1:
    # ベンチ案内・スコア入力・統合レポートの基準ホスト（ちょうど1台）
    reporter:
      hosts:
        isucon-1:
