all:
  children:
    # 役割グループ。同じホストを複数グループに入れてよい。
    # 1台構成: 全グループに同じホスト / 3台構成: 役割ごとに分ける
    #
    # private_ip はサーバ間通信用（nginx→app、app→db）。
    # Ansible が自動参照する（手で nginx conf / MYSQL_HOST に書かなくてよい）。
    # 参照箇所: nginx upstream / app listen / env.sh の MYSQL_HOST
    # MariaDB は常に 0.0.0.0 待受 + リモート GRANT（構成によらない）
    app:
      hosts:
        isucon-1:
          ansible_host: 52.195.6.219
          private_ip: 10.0.0.202
    db:
      hosts:
        isucon-2:
          ansible_host: 13.193.217.22
          private_ip: 10.0.0.121
    nginx:
      hosts:
        isucon-1:
    # ベンチ案内・スコア入力・統合レポートの基準ホスト（ちょうど1台）
    reporter:
      hosts:
        isucon-1:
