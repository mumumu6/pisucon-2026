all:
  children:
    # 役割グループ。同じホストを複数グループに入れてよい。
    # 1台構成: 全グループに同じホスト / 3台構成: 役割ごとに分ける
    #
    # private_ip はサーバ間通信用（nginx→app）。Ansible が nginx upstream / app listen に使う。
    # app→db の MYSQL_HOST は env.sh を手で直す（Ansible は触らない）。
    # MariaDB は常に 0.0.0.0 待受 + リモート GRANT（構成によらない）
    app:
      hosts:
        isucon-1:
          ansible_host: 13.115.183.239
          private_ip: 10.0.0.202
    db:
      hosts:
        isucon-2:
          ansible_host: 13.230.18.219
          private_ip: 10.0.0.121
    nginx:
      hosts:
        isucon-1:
    # ベンチ案内・スコア入力・統合レポートの基準ホスト（ちょうど1台）
    reporter:
      hosts:
        isucon-1:
