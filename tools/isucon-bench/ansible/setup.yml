---
# 役割ごとのセットアップを組み立てる薄い playbook。
# 実体は tasks/{common,app,nginx,db}/ を参照。
- name: ISUCON用の計測ツールを導入する
  hosts: all
  become: true
  vars:
    alp_arch_map:
      x86_64: amd64
      aarch64: arm64
  tasks:
    - name: 共通パッケージを導入する
      tags: [common, packages]
      ansible.builtin.include_tasks: tasks/common/packages.yml

    - name: GitHub用SSH鍵を配置する
      tags: [common, github]
      ansible.builtin.include_tasks: tasks/common/github-ssh.yml

    - name: アプリ役割をセットアップする
      tags: [app]
      when: inventory_hostname in groups['app']
      block:
        - name: アプリ用パッケージを導入する
          tags: [packages]
          ansible.builtin.include_tasks: tasks/app/packages.yml
        - name: アプリのsystemd設定を反映する
          ansible.builtin.include_tasks: tasks/app/systemd.yml
          vars:
            force_daemon_reload: true

    - name: DB役割をセットアップする
      tags: [db]
      when: inventory_hostname in groups['db']
      block:
        - name: DB用パッケージを導入する
          tags: [packages]
          ansible.builtin.include_tasks: tasks/db/packages.yml
        - name: MariaDBの設定を反映する
          tags: [mysql]
          ansible.builtin.include_tasks: tasks/db/performance.yml

    - name: Nginx役割をセットアップする
      tags: [nginx]
      when: inventory_hostname in groups['nginx']
      block:
        - name: Nginx用パッケージとAlpを導入する
          tags: [packages, alp]
          ansible.builtin.include_tasks: tasks/nginx/packages.yml
        - name: Nginxの設定を反映する
          ansible.builtin.include_tasks: tasks/nginx/configure.yml
          vars:
            nginx_config_scope: full
            restart_nginx: true

    - name: 役割に合わせてサービスを起動または停止する
      tags: [services]
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        state: "{{ 'started' if (item.roles | intersect(group_names) | length) > 0 else 'stopped' }}"
        enabled: "{{ (item.roles | intersect(group_names) | length) > 0 }}"
      loop: "{{ fleet_services }}"
      loop_control:
        label: "{{ item.name }}"
      failed_when: false
