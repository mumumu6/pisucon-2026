---
# 初回: 計測ツールのみ導入。nginx / mariadb / go は大会イメージ前提（入れ直さない）。
# 鍵は init-git。etc は make deploy。
- name: ISUCON用の計測ツールを導入する
  hosts: all
  become: true
  vars:
    alp_arch_map:
      x86_64: amd64
      aarch64: arm64
  tasks:
    - name: 共通パッケージを導入する
      ansible.builtin.apt:
        name: "{{ ['curl', 'git', 'jq'] + (['netdata'] if (netdata_enabled | bool) else []) }}"
        state: present
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
        lock_timeout: 600
      register: common_packages
      retries: 40
      delay: 15
      until: common_packages is succeeded

    - name: DB用にpt-query-digestを導入する
      when: inventory_hostname in groups['db']
      ansible.builtin.apt:
        name: [percona-toolkit]
        state: present
        lock_timeout: 600
      register: database_packages
      retries: 40
      delay: 15
      until: database_packages is succeeded

    - name: スローログ用の置き場を用意する
      when: inventory_hostname in groups['db']
      ansible.builtin.file:
        path: "{{ slow_log | dirname }}"
        state: directory
        owner: mysql
        group: adm
        mode: "0750"

    - name: スローログファイルを用意する
      when: inventory_hostname in groups['db']
      ansible.builtin.file:
        path: "{{ slow_log }}"
        state: touch
        owner: mysql
        group: adm
        mode: "0640"
        modification_time: preserve
        access_time: preserve

    - name: リモート接続用ユーザーを許可する
      when: inventory_hostname in groups['db']
      ansible.builtin.shell: |
        set -euo pipefail
        {{ mysql_admin_command }} --execute="CREATE USER IF NOT EXISTS '{{ mysql_user }}'@'%' IDENTIFIED BY '{{ mysql_password }}'; GRANT ALL PRIVILEGES ON *.* TO '{{ mysql_user }}'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Alpを導入する
      when: inventory_hostname in groups['nginx']
      ansible.builtin.unarchive:
        src: "https://github.com/tkuchiki/alp/releases/download/v{{ alp_version }}/alp_linux_{{ alp_arch_map[ansible_architecture] }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"

    - name: 役割に合わせてサービスを起動または停止する
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        state: "{{ 'started' if (item.roles | intersect(group_names) | length) > 0 else 'stopped' }}"
        enabled: "{{ (item.roles | intersect(group_names) | length) > 0 }}"
      loop: "{{ fleet_services }}"
      loop_control:
        label: "{{ item.name }}"
      failed_when: false
