---
- name: ISUCON用の計測ツールを導入する
  hosts: all
  become: true
  vars:
    alp_version: "1.0.21"
    alp_arch_map:
      x86_64: amd64
      aarch64: arm64
  tasks:
    - name: 共通パッケージを導入する
      ansible.builtin.apt:
        name:
          - curl
          - git
          - jq
          - netdata
        state: present
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
        # Freshly created ISUCON instances may still run cloud-init's apt job.
        # Wait for its dpkg lock instead of failing the bootstrap.
        lock_timeout: 600
      register: common_packages
      retries: 40
      delay: 15
      until: common_packages is succeeded

    - name: アプリホストへGoを導入する
      ansible.builtin.apt:
        name: golang-go
        state: present
        lock_timeout: 600
      register: go_packages
      retries: 40
      delay: 15
      until: go_packages is succeeded
      when: inventory_hostname in groups['app']

    - name: DBホストへMariaDBとpt-query-digestを導入する
      ansible.builtin.apt:
        name:
          - mariadb-server
          - percona-toolkit
        state: present
        lock_timeout: 600
      register: database_packages
      retries: 40
      delay: 15
      until: database_packages is succeeded
      when: inventory_hostname in groups['db']

    - name: DBホストのMariaDBを起動・自動起動にする
      ansible.builtin.systemd:
        name: mariadb
        state: started
        enabled: true
      when: inventory_hostname in groups['db']

    - name: DBホストへMariaDB性能設定を反映する
      ansible.builtin.include_tasks: tasks/mysql-performance.yml
      when: inventory_hostname in groups['db']

    - name: Alp対応アーキテクチャを確認する
      ansible.builtin.assert:
        that: ansible_architecture in alp_arch_map
        fail_msg: "Unsupported alp architecture: {{ ansible_architecture }}"

    - name: NginxホストへAlpを導入する
      ansible.builtin.unarchive:
        src: "https://github.com/tkuchiki/alp/releases/download/v{{ alp_version }}/alp_linux_{{ alp_arch_map[ansible_architecture] }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
      when: inventory_hostname in groups['nginx']

    - name: Nginxホストへ静的配信用パッケージを導入する
      ansible.builtin.apt:
        name:
          - nginx
        state: present
        lock_timeout: 600
      register: nginx_packages
      retries: 40
      delay: 15
      until: nginx_packages is succeeded
      when: inventory_hostname in groups['nginx']

    - name: Nginxへ静的配信とAPIプロキシの設定を配置する
      ansible.builtin.template:
        src: templates/isucondition.nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
        owner: root
        group: root
        mode: "0644"
      notify: Nginxを再読み込みする
      when: inventory_hostname in groups['nginx']

    - name: Nginxサイトを有効化する
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}.conf"
        state: link
      notify: Nginxを再読み込みする
      when: inventory_hostname in groups['nginx']

    - name: Nginxの既定サイトを無効化する
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Nginxを再読み込みする
      when: inventory_hostname in groups['nginx']

    - name: Nginxを起動・自動起動にする
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true
      when: inventory_hostname in groups['nginx']

    - name: Netdataを起動・自動起動にする
      ansible.builtin.systemd:
        name: "{{ netdata_service }}"
        state: started
        enabled: true

    - name: DBホストのスロークエリログを有効にする
      ansible.builtin.command:
        argv:
          - "{{ mysql_admin_command }}"
          - "--execute=SET GLOBAL long_query_time={{ mysql_slow_query_time }}; SET GLOBAL slow_query_log='ON';"
      changed_when: true
      when: inventory_hostname in groups['db']

  handlers:
    - name: Nginxを再読み込みする
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: MariaDBを再起動する
      ansible.builtin.systemd:
        name: mariadb
        state: restarted
