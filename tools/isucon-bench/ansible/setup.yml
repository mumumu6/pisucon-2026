---
- name: ISUCON用の計測ツールを導入する
  hosts: all
  become: true
  vars:
    alp_arch_map:
      x86_64: amd64
      aarch64: arm64
  tasks:
    - name: 共通パッケージを導入する
      tags: [common, packages]
      ansible.builtin.apt:
        name:
          - curl
          - git
          - jq
          - netdata
        state: present
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
        # Freshly created ISUCON instances may still run cloud-init's apt job.
        lock_timeout: 600
      register: common_packages
      retries: 40
      delay: 15
      until: common_packages is succeeded

    - name: 全ホストへGitHub用SSH鍵を配置する
      tags: [common, github]
      ansible.builtin.include_tasks: tasks/github-ssh.yml

    - name: アプリホストへGoを導入する
      tags: [app, packages]
      ansible.builtin.apt:
        name: golang-go
        state: present
        lock_timeout: 600
      register: go_packages
      retries: 40
      delay: 15
      until: go_packages is succeeded
      when: inventory_hostname in groups['app']

    - name: アプリのsystemd overrideを配置する
      tags: [app]
      ansible.builtin.include_tasks: tasks/app-systemd.yml
      vars:
        force_daemon_reload: true
      when: inventory_hostname in groups['app']

    - name: DBホストへMariaDBとpt-query-digestを導入する
      tags: [db, packages]
      ansible.builtin.apt:
        name:
          - mariadb-server
          - percona-toolkit
        state: present
        lock_timeout: 600
      register: database_packages
      retries: 40
      delay: 15
      until: database_packages is succeeded
      when: inventory_hostname in groups['db']

    - name: DBホストのMariaDBを起動・自動起動にする
      tags: [db]
      ansible.builtin.systemd:
        name: "{{ mysql_service }}"
        state: started
        enabled: true
      when: inventory_hostname in groups['db']

    - name: DBホストへMariaDB性能設定を反映する
      tags: [db, mysql]
      ansible.builtin.include_tasks: tasks/mysql-performance.yml
      when: inventory_hostname in groups['db']

    - name: Alp対応アーキテクチャを確認する
      tags: [nginx, alp]
      ansible.builtin.assert:
        that: ansible_architecture in alp_arch_map
        fail_msg: "Unsupported alp architecture: {{ ansible_architecture }}"
      when: inventory_hostname in groups['nginx']

    - name: NginxホストへAlpを導入する
      tags: [nginx, alp]
      ansible.builtin.unarchive:
        src: "https://github.com/tkuchiki/alp/releases/download/v{{ alp_version }}/alp_linux_{{ alp_arch_map[ansible_architecture] }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
      when: inventory_hostname in groups['nginx']

    - name: Nginxホストへ静的配信用パッケージを導入する
      tags: [nginx, packages]
      ansible.builtin.apt:
        name:
          - nginx
        state: present
        lock_timeout: 600
      register: nginx_packages
      retries: 40
      delay: 15
      until: nginx_packages is succeeded
      when: inventory_hostname in groups['nginx']

    - name: Nginxのsystemd overrideディレクトリを作る
      tags: [nginx]
      ansible.builtin.file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: inventory_hostname in groups['nginx']

    - name: Nginxのファイルディスクリプタ上限を設定する
      tags: [nginx]
      ansible.builtin.template:
        src: templates/nginx.service-limit-nofile.conf.j2
        dest: /etc/systemd/system/nginx.service.d/limit-nofile.conf
        owner: root
        group: root
        mode: "0644"
        backup: true
      notify: Nginxを再起動する
      when: inventory_hostname in groups['nginx']

    - name: Nginxのworker接続数を設定する
      tags: [nginx]
      ansible.builtin.replace:
        path: /etc/nginx/nginx.conf
        regexp: 'worker_connections\s+\d+;'
        replace: 'worker_connections {{ nginx_worker_connections }};'
        backup: true
      notify: Nginxを再起動する
      when: inventory_hostname in groups['nginx']

    - name: Nginxのworker_rlimit_nofileを設定する
      tags: [nginx]
      ansible.builtin.lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: '^\s*worker_rlimit_nofile\s+'
        line: "worker_rlimit_nofile {{ nginx_limit_nofile }};"
        insertafter: '^worker_processes'
        backup: true
      notify: Nginxを再起動する
      when: inventory_hostname in groups['nginx']

    - name: Nginxのサイト設定を配置する
      tags: [nginx]
      ansible.builtin.include_tasks: tasks/nginx-site.yml
      vars:
        restart_nginx: true
      when: inventory_hostname in groups['nginx']

    - name: Nginxの既定サイトを無効化する
      tags: [nginx]
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Nginxを再起動する
      when: inventory_hostname in groups['nginx']

    # inventory の app/nginx/db 所属に合わせて起動・停止する
    - name: 役割に合わせてサービスを起動または停止する
      tags: [services]
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        state: "{{ 'started' if (item.roles | intersect(group_names) | length) > 0 else 'stopped' }}"
        enabled: "{{ (item.roles | intersect(group_names) | length) > 0 }}"
      loop: "{{ fleet_services }}"
      loop_control:
        label: "{{ item.name }}"
      failed_when: false

    - name: 計測系（netdata / slow query）を有効にする
      tags: [monitor]
      ansible.builtin.include_tasks: tasks/monitor.yml
      vars:
        monitor_state: on

  handlers:
    - name: Goアプリのsystemd設定を反映する
      ansible.builtin.systemd:
        name: "{{ app_service }}"
        daemon_reload: true
        state: restarted

    - name: Nginxを再起動する
      ansible.builtin.systemd:
        name: nginx
        daemon_reload: true
        state: restarted

    - name: MariaDBを再起動する
      ansible.builtin.systemd:
        name: "{{ mysql_service }}"
        state: restarted
