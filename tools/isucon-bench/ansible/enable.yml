---
- name: ホスト監視を有効にする
  hosts: all
  become: true
  tasks:
    - name: Netdataを起動・自動起動にする
      ansible.builtin.systemd:
        name: "{{ netdata_service }}"
        state: started
        enabled: true

- name: MariaDBのスロークエリログを有効にする
  hosts: db
  become: true
  tasks:
    - name: スロークエリログの設定を反映する
      ansible.builtin.command:
        argv:
          - "{{ mysql_admin_command }}"
          - "--execute=SET GLOBAL long_query_time={{ mysql_slow_query_time }}; SET GLOBAL slow_query_log='ON';"
      changed_when: true
