---
- name: 全ホストでISUCONベンチ計測を実行する
  hosts: all
  gather_facts: false
  any_errors_fatal: true
  vars:
    # alp_options / pt_query_digest_options は group_vars を使う（ここで [] 上書きしない）
    session_dir: "{{ remote_log_root }}/{{ session_id }}/{{ inventory_hostname }}"

  pre_tasks:
    - name: ベンチ計測の設定とinventoryを検証する
      ansible.builtin.assert:
        that:
          - session_id is match('^[0-9]{8}-[0-9]{6}$')
          - groups.get('reporter', []) | length == 1
          - groups.get('app', []) | length > 0
          - groups.get('db', []) | length > 0
          - groups.get('nginx', []) | length > 0
          - remote_project_root is defined
          - app_working_dir is defined
          - remote_log_root is defined
        fail_msg: >-
          inventory must define exactly one reporter, and non-empty app, db and
          nginx groups together with remote_project_root, app_working_dir and
          remote_log_root
      when: inventory_hostname == ansible_play_hosts_all[0]

    - name: ホストごとの計測結果ディレクトリを作る
      ansible.builtin.file:
        path: "{{ session_dir }}"
        state: directory
        mode: "0755"

  tasks:
    - name: ベンチ計測と終了後の解析を実行する
      block:
        - name: ベンチ前にMariaDBを再起動する
          ansible.builtin.systemd:
            name: "{{ mysql_service }}"
            state: restarted
          become: true
          when: inventory_hostname in groups['db']

        - name: デプロイ済みのGitリビジョンを取得する
          ansible.builtin.command:
            argv: [git, rev-parse, HEAD]
            chdir: "{{ remote_project_root }}"
          register: deployed_revision
          changed_when: false
          failed_when: false
          when: inventory_hostname in groups['reporter']

        - name: Gitリビジョンを保存する
          ansible.builtin.copy:
            content: "{{ deployed_revision.stdout | default('unknown', true) }}\n"
            dest: "{{ session_dir }}/git-revision.txt"
            mode: "0644"
          when: inventory_hostname in groups['reporter']

        - name: アプリホストでアプリをビルドする
          ansible.builtin.command:
            argv: [/bin/bash, -lc, "{{ build_command }}"]
            chdir: "{{ app_working_dir }}"
          changed_when: true
          when:
            - inventory_hostname in groups['app']
            - build_command | length > 0

        - name: アプリホストでアプリを再起動する
          ansible.builtin.command:
            argv: [/bin/bash, -lc, "{{ restart_command }}"]
            chdir: "{{ app_working_dir }}"
          changed_when: true
          when:
            - inventory_hostname in groups['app']
            - restart_command | length > 0

        - name: ベンチ前にNginxを再起動する
          ansible.builtin.systemd:
            name: nginx
            state: restarted
          become: true
          when: inventory_hostname in groups['nginx']

        - name: 計測中のnetdataを起動する
          ansible.builtin.systemd:
            name: "{{ netdata_service }}"
            state: started
            enabled: true
          become: true
          when: netdata_enabled | bool

        - name: Nginxのaccess logを確認する
          ansible.builtin.stat:
            path: "{{ access_log }}"
          register: access_log_stat
          become: true
          when: inventory_hostname in groups['nginx']

        - name: ベンチ前にnginxのaccess logを空にする
          ansible.builtin.command:
            argv: [truncate, -s, "0", "{{ access_log }}"]
          become: true
          changed_when: true
          when:
            - inventory_hostname in groups['nginx']
            - access_log_stat.stat.exists | default(false)

        - name: MariaDBのスロークエリログを確認する
          ansible.builtin.stat:
            path: "{{ slow_log }}"
          register: slow_log_stat
          become: true
          when: inventory_hostname in groups['db']

        - name: ベンチ前にMariaDBのスロークエリログを空にする
          ansible.builtin.command:
            argv: [truncate, -s, "0", "{{ slow_log }}"]
          become: true
          changed_when: true
          when:
            - inventory_hostname in groups['db']
            - slow_log_stat.stat.exists | default(false)

        - name: MariaDBのスロークエリログが有効であることを確認する
          ansible.builtin.command:
            argv:
              - "{{ mysql_admin_command }}"
              - "--execute=SET GLOBAL long_query_time={{ mysql_slow_query_time }}; SET GLOBAL slow_query_log='ON';"
          become: true
          changed_when: true
          when: inventory_hostname in groups['db']

        - name: 計測開始時刻を記録する
          ansible.builtin.command:
            argv: [date, +%s]
          register: benchmark_started_epoch
          changed_when: false

        - name: アプリホストでCPUプロファイル取得を開始する
          ansible.builtin.command:
            argv:
              - go
              - tool
              - pprof
              - -proto
              - -output
              - "{{ session_dir }}/cpu.pprof"
              - "-seconds={{ pprof_seconds }}"
              - "{{ pprof_url }}"
          async: "{{ (pprof_seconds | int) + 120 }}"
          poll: 0
          register: pprof_job
          changed_when: true
          when:
            - inventory_hostname in groups['app']
            - pprof_url | length > 0

        - name: ブラウザでベンチを開始するよう案内する
          ansible.builtin.debug:
            msg: "計測を開始しました。ブラウザでベンチを開始してください。"
          when: inventory_hostname == groups['reporter'][0]

        - name: ブラウザベンチの終了とスコア入力を待つ
          ansible.builtin.pause:
            prompt: >-
              ブラウザのベンチが終了したら表示されたスコアを入力してください。
              不明な場合はEnterだけを押してください。
          register: browser_benchmark_result
          when: inventory_hostname == groups['reporter'][0]

        - name: ベンチスコアを保存する
          ansible.builtin.copy:
            content: >-
              {{ hostvars[groups['reporter'][0]].browser_benchmark_result.user_input
                 | default('unknown', true) }}
            dest: "{{ session_dir }}/score.txt"
            mode: "0644"
          when: inventory_hostname == groups['reporter'][0]

        - name: 計測終了時刻を記録する
          ansible.builtin.command:
            argv: [date, +%s]
          register: measurement_stopped_epoch
          changed_when: false

        - name: CPUプロファイル取得の完了を待つ
          ansible.builtin.async_status:
            jid: "{{ pprof_job.ansible_job_id }}"
          register: pprof_result
          until: pprof_result.finished
          retries: "{{ (((pprof_seconds | int) + 120) / 5) | round(0, 'ceil') | int }}"
          delay: 5
          failed_when: false
          when:
            - inventory_hostname in groups['app']
            - pprof_url | length > 0

      always:
        - name: 中断時の計測終了時刻を記録する
          ansible.builtin.command:
            argv: [date, +%s]
          register: fallback_stopped_epoch
          changed_when: false
          when: measurement_stopped_epoch is not defined

        - name: 有効な計測終了時刻を選ぶ
          ansible.builtin.set_fact:
            effective_stopped_epoch: >-
              {{ measurement_stopped_epoch.stdout
                 if measurement_stopped_epoch is defined
                 else fallback_stopped_epoch.stdout }}

        - name: Nginxのaccess logを計測結果へコピーする
          ansible.builtin.copy:
            src: "{{ access_log }}"
            dest: "{{ session_dir }}/access.log"
            remote_src: true
            owner: "{{ ansible_user }}"
            mode: "0644"
          become: true
          failed_when: false
          when:
            - inventory_hostname in groups['nginx']
            - access_log_stat.stat.exists | default(false)

        - name: MariaDBのスロークエリログを計測結果へコピーする
          ansible.builtin.copy:
            src: "{{ slow_log }}"
            dest: "{{ session_dir }}/mysql-slow.log"
            remote_src: true
            owner: "{{ ansible_user }}"
            mode: "0644"
          become: true
          failed_when: false
          when:
            - inventory_hostname in groups['db']
            - slow_log_stat.stat.exists | default(false)

        - name: AlpでNginxのaccess logを解析する
          ansible.builtin.command:
            argv: >-
              {{ ['alp', access_log_format, '--file', session_dir + '/access.log',
                  '--sort', 'sum', '--reverse'] + alp_options }}
          register: alp_result
          changed_when: false
          failed_when: false
          when: inventory_hostname in groups['nginx']

        - name: Alp解析結果を保存する
          ansible.builtin.copy:
            content: "{{ alp_result.stdout | default('No access log data collected.', true) }}\n"
            dest: "{{ session_dir }}/alp.txt"
            mode: "0644"
          when: inventory_hostname in groups['nginx']

        - name: 解析対象のスロークエリログを確認する
          ansible.builtin.stat:
            path: "{{ session_dir }}/mysql-slow.log"
          register: session_slow_log_stat
          when: inventory_hostname in groups['db']

        - name: MariaDBのスロークエリログを解析する
          ansible.builtin.command:
            argv: >-
              {{ ['timeout', pt_query_digest_timeout_seconds | default(120) | string,
                  'pt-query-digest', '--limit', '20'] + pt_query_digest_options +
                 [session_dir + '/mysql-slow.log'] }}
          register: slow_query_result
          changed_when: false
          failed_when: false
          when:
            - inventory_hostname in groups['db']
            - session_slow_log_stat.stat.exists | default(false)
            - (session_slow_log_stat.stat.size | default(0)) > 0


        - name: スロークエリ解析結果を保存する
          ansible.builtin.copy:
            content: "{{ slow_query_result.stdout | default('No slow-query data collected.', true) }}\n"
            dest: "{{ session_dir }}/pt-query-digest.txt"
            mode: "0644"
          when:
            - inventory_hostname in groups['db']
            - slow_query_result is defined

        - name: 取得したCPUプロファイルを確認する
          ansible.builtin.stat:
            path: "{{ session_dir }}/cpu.pprof"
          register: cpu_profile_stat
          when: inventory_hostname in groups['app']

        - name: 累積CPUプロファイルを解析する
          ansible.builtin.command:
            argv:
              - go
              - tool
              - pprof
              - -top
              - -cum
              - "{{ session_dir }}/cpu.pprof"
          register: pprof_top_result
          changed_when: false
          failed_when: false
          when:
            - inventory_hostname in groups['app']
            - cpu_profile_stat.stat.exists | default(false)
            - cpu_profile_stat.stat.size | default(0) > 0

        - name: CPUプロファイル解析結果を保存する
          ansible.builtin.copy:
            content: "{{ pprof_top_result.stdout | default('No CPU profile collected.', true) }}\n"
            dest: "{{ session_dir }}/pprof.txt"
            mode: "0644"
          when: inventory_hostname in groups['app']

        - name: Netdata結果用ディレクトリを作る
          ansible.builtin.file:
            path: "{{ session_dir }}/netdata"
            state: directory
            mode: "0755"
          when: netdata_enabled | bool

        - name: 計測期間のnetdataチャートを取得する
          ansible.builtin.command:
            argv:
              - curl
              - --fail
              - --silent
              - --show-error
              - --get
              - --data-urlencode
              - "chart={{ item }}"
              - --data-urlencode
              - "after={{ benchmark_started_epoch.stdout }}"
              - --data-urlencode
              - "before={{ effective_stopped_epoch }}"
              - --data-urlencode
              - format=json
              - --output
              - "{{ session_dir }}/netdata/{{ item | replace('/', '_') }}.json"
              - "{{ netdata_url }}/api/v1/data"
          loop: "{{ netdata_charts }}"
          changed_when: true
          failed_when: false
          when:
            - netdata_enabled | bool
            - benchmark_started_epoch.stdout is defined

        - name: Netdataの平均値と最大値を集計する
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              : > netdata.txt
              for chart_file in netdata/*.json; do
                [ -e "$chart_file" ] || continue
                printf '[%s]\n' "$(basename "$chart_file" .json)" >> netdata.txt
                jq -r '
                  .labels as $labels |
                  range(1; $labels | length) as $column |
                  [.data[][$column] | numbers] as $values |
                  if ($values | length) > 0 then
                    [$labels[$column], (($values | add) / ($values | length)), ($values | max)] |
                    @tsv
                  else empty end
                ' "$chart_file" |
                  awk 'BEGIN { print "dimension\taverage\tmax" } { print }' >> netdata.txt
                printf '\n' >> netdata.txt
              done
            chdir: "{{ session_dir }}"
            executable: /bin/bash
          changed_when: true
          failed_when: false
          when: netdata_enabled | bool

        - name: 解析後に生ログを削除する
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ session_dir }}/access.log"
            - "{{ session_dir }}/mysql-slow.log"

        - name: 集計後にnetdataの生レスポンスを削除する
          ansible.builtin.file:
            path: "{{ session_dir }}/netdata"
            state: absent
          when: netdata_enabled | bool
