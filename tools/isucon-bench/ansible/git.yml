---
- name: Restore the application Git repository
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Validate Git bootstrap settings
      ansible.builtin.assert:
        that:
          - remote_project_root is defined
          - remote_project_root | length > 1
          - git_repository is defined
          - git_repository | length > 0
          - git_version is defined
          - git_version | length > 0
          - git_user_name is defined
          - git_user_name | length > 0
          - git_user_email is defined
          - git_user_email | length > 0
        fail_msg: >-
          Set remote_project_root, git_repository, git_version and Git identity
          values in group_vars/all.yml.

  tasks:
    - name: Install Git
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true
      become: true

    - name: Clone or update the configured repository
      ansible.builtin.git:
        repo: "{{ git_repository }}"
        dest: "{{ remote_project_root }}"
        version: "{{ git_version }}"
        update: true
        force: false
        accept_newhostkey: true

    - name: Read repository-local Git user name
      ansible.builtin.command:
        argv: [git, config, --local, --get, user.name]
        chdir: "{{ remote_project_root }}"
      register: existing_git_user_name
      changed_when: false
      failed_when: existing_git_user_name.rc not in [0, 1]

    - name: Configure repository-local Git user name
      ansible.builtin.command:
        argv: [git, config, --local, user.name, "{{ git_user_name }}"]
        chdir: "{{ remote_project_root }}"
      changed_when: true
      when: existing_git_user_name.stdout != git_user_name

    - name: Read repository-local Git email
      ansible.builtin.command:
        argv: [git, config, --local, --get, user.email]
        chdir: "{{ remote_project_root }}"
      register: existing_git_user_email
      changed_when: false
      failed_when: existing_git_user_email.rc not in [0, 1]

    - name: Configure repository-local Git email
      ansible.builtin.command:
        argv: [git, config, --local, user.email, "{{ git_user_email }}"]
        chdir: "{{ remote_project_root }}"
      changed_when: true
      when: existing_git_user_email.stdout != git_user_email
