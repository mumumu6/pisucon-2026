---
- name: アプリケーションのGitリポジトリを同期する
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Git同期設定を検証する
      ansible.builtin.assert:
        that:
          - remote_project_root is defined
          - remote_project_root | length > 1
          - git_repository is defined
          - git_repository | length > 0
          - git_version is defined
          - git_version | length > 0
          - git_user_name is defined
          - git_user_name | length > 0
          - git_user_email is defined
          - git_user_email | length > 0
        fail_msg: >-
          Set remote_project_root, git_repository, git_version and Git identity
          values in group_vars/all.yml.

  tasks:
    - name: リポジトリを同期する
      ansible.builtin.include_tasks: tasks/common/git-sync.yml

