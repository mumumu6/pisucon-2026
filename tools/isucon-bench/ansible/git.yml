---
# リポジトリを git_repository / git_version へ同期する（make server-sync）
- name: アプリケーションのGitリポジトリを同期する
  hosts: all
  gather_facts: false
  tasks:
    - name: リポジトリの.git有無を確認する
      ansible.builtin.stat:
        path: "{{ remote_project_root }}/.git"
      register: project_git_dir

    - name: .gitが無いホストでリポジトリを初期化する
      ansible.builtin.shell: |
        set -euo pipefail
        git init
        if git remote get-url origin >/dev/null 2>&1; then
          git remote set-url origin "{{ git_repository }}"
        else
          git remote add origin "{{ git_repository }}"
        fi
        git fetch --depth=1 origin "{{ git_version }}"
        # 初期イメージの webapp/ 等が untracked で残っているので強制上書きする
        git checkout -f -B "{{ git_version }}" FETCH_HEAD
      args:
        chdir: "{{ remote_project_root }}"
        executable: /bin/bash
      when: not project_git_dir.stat.exists

    - name: リポジトリを最新化する
      ansible.builtin.git:
        repo: "{{ git_repository }}"
        dest: "{{ remote_project_root }}"
        version: "{{ git_version }}"
        update: true
        force: true
        accept_newhostkey: true

    - name: Git user.name を設定する
      ansible.builtin.command:
        argv: [git, config, --local, user.name, "{{ git_user_name }}"]
        chdir: "{{ remote_project_root }}"
      changed_when: false

    - name: Git user.email を設定する
      ansible.builtin.command:
        argv: [git, config, --local, user.email, "{{ git_user_email }}"]
        chdir: "{{ remote_project_root }}"
      changed_when: false
