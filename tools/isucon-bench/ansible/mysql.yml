---
# make mysql-tune 用。setup 全体を流さず性能 cnf だけ反映する。
- name: Git管理されたMariaDB性能設定を反映する
  hosts: db
  become: true
  tasks:
    - name: MariaDB性能設定を反映する
      ansible.builtin.include_tasks: tasks/mysql-performance.yml

  handlers:
    - name: MariaDBを再起動する
      ansible.builtin.systemd:
        name: "{{ mysql_service }}"
        state: restarted
