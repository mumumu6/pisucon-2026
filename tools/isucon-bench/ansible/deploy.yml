---
# make deploy: server-sync 後に systemd・ビルド・nginx を反映する。
- name: アプリをビルド・再起動し、関連設定を反映する
  hosts: app:nginx
  gather_facts: false

  pre_tasks:
    - name: ビルド設定を検証する
      ansible.builtin.assert:
        that:
          - app_working_dir is defined
          - app_working_dir | length > 0
          - build_command is defined
          - build_command | length > 0
          - app_service is defined
          - app_service | length > 0
          - app_unix_socket is defined
          - app_unix_socket | length > 0
        fail_msg: >-
          Set app_working_dir, build_command, app_service and app_unix_socket
          in group_vars/all.yml.
      when: inventory_hostname in groups['app']

  tasks:
    - name: アプリのsystemd設定を反映する
      ansible.builtin.include_tasks: tasks/app/systemd.yml
      vars:
        force_daemon_reload: true
      when: inventory_hostname in groups['app']

    - name: アプリをビルドして再起動する
      ansible.builtin.include_tasks: tasks/app/build.yml
      when: inventory_hostname in groups['app']

    - name: Nginxのサイト設定を反映する
      ansible.builtin.include_tasks: tasks/nginx/configure.yml
      vars:
        nginx_config_scope: site
        restart_nginx: true
      when: inventory_hostname in groups['nginx']
