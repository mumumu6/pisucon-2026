---
# 全管理対象ホストで共有する非秘密設定。制御用リポジトリを新規cloneした場合も同じ構成を再現できるよう、Git管理します。

remote_project_root: /home/isucon
remote_log_root: /home/isucon/log
app_working_dir: /home/isucon/webapp/go

git_repository: git@github.com:mumumu6/pisucon-2026.git
git_version: main
git_user_name: mumumu6
git_user_email: takumu.sato@gmail.com

# アプリ固有の操作。
build_command: go build -o isucondition .
restart_command: sudo systemctl restart isucondition.go.service

# ログと解析ツール。
access_log: /var/log/nginx/access.log
access_log_format: ltsv
alp_options: []
mysql_admin_command: mysql
mysql_slow_query_time: 0
slow_log: /var/log/mysql/mariadb-slow.log
# COMMITごとのfsyncを避けるISUCON向け設定。OS/電源断時は直近約1秒の更新を失う可能性があります。
mysql_innodb_flush_log_at_trx_commit: 2
mysql_sync_binlog: 0
# BLOBを含む実SQLは出力せず、集計表だけをレポートへ残す。
pt_query_digest_options:
  - --report-format
  - profile

# Goプロファイリング。待受先はlocalhostに限定します。
pprof_url: http://127.0.0.1:6060/debug/pprof/profile
pprof_seconds: 75

# ホストメトリクス。
netdata_enabled: true
netdata_service: netdata
netdata_url: http://127.0.0.1:19999
netdata_charts:
  - system.cpu
  - system.ram
  - system.load
  - system.io

github_repository: mumumu6/pisucon-2026
create_github_issue: true
fleet_auto_publish: false
