---
- name: node_exporter アーカイブを取得する
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ observe_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"

- name: node_exporter を展開する
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ observe_arch }}/node_exporter"

- name: node_exporter バイナリを配置する
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ observe_arch }}/node_exporter"
    dest: "{{ observe_root }}/bin/node_exporter"
    remote_src: true
    mode: "0755"

- name: node_exporter の systemd を配置する
  ansible.builtin.template:
    src: templates/observe/node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: Observe agent を再読み込みする

- name: node_exporter を有効化して起動する
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
