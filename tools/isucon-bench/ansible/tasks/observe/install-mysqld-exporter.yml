---
- name: mysqld_exporter アーカイブを取得する
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/mysqld_exporter/releases/download/v{{ mysqld_exporter_version }}/mysqld_exporter-{{ mysqld_exporter_version }}.linux-{{ observe_arch }}.tar.gz"
    dest: "/tmp/mysqld_exporter-{{ mysqld_exporter_version }}.tar.gz"
    mode: "0644"

- name: mysqld_exporter を展開する
  ansible.builtin.unarchive:
    src: "/tmp/mysqld_exporter-{{ mysqld_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/mysqld_exporter-{{ mysqld_exporter_version }}.linux-{{ observe_arch }}/mysqld_exporter"

- name: mysqld_exporter バイナリを配置する
  ansible.builtin.copy:
    src: "/tmp/mysqld_exporter-{{ mysqld_exporter_version }}.linux-{{ observe_arch }}/mysqld_exporter"
    dest: "{{ observe_root }}/bin/mysqld_exporter"
    remote_src: true
    mode: "0755"

- name: mysqld_exporter 用の権限を付与する
  ansible.builtin.shell: |
    {{ mysql_admin_command }} -e "
      GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO '{{ mysql_user }}'@'localhost' IDENTIFIED BY '{{ mysql_password }}';
      GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO '{{ mysql_user }}'@'127.0.0.1' IDENTIFIED BY '{{ mysql_password }}';
      FLUSH PRIVILEGES;
    "
  changed_when: true
  failed_when: false

- name: mysqld_exporter の接続設定を配置する
  ansible.builtin.template:
    src: templates/observe/mysqld_exporter.cnf.j2
    dest: "{{ observe_root }}/mysqld_exporter.cnf"
    mode: "0644"
    owner: root
    group: root

- name: mysqld_exporter の systemd を配置する
  ansible.builtin.template:
    src: templates/observe/mysqld_exporter.service.j2
    dest: /etc/systemd/system/mysqld_exporter.service
    mode: "0644"
  notify: Observe agent を再読み込みする

- name: mysqld_exporter を有効化して起動する
  ansible.builtin.systemd:
    name: mysqld_exporter
    state: started
    enabled: true
    daemon_reload: true
