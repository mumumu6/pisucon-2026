---
- name: Alloy アーカイブを取得する
  ansible.builtin.get_url:
    url: "https://github.com/grafana/alloy/releases/download/v{{ alloy_version }}/alloy-linux-{{ observe_arch }}.zip"
    dest: "/tmp/alloy-{{ alloy_version }}.zip"
    mode: "0644"

- name: Alloy 展開用ディレクトリを作る
  ansible.builtin.file:
    path: "/tmp/alloy-{{ alloy_version }}"
    state: directory
    mode: "0755"

- name: Alloy を展開する
  ansible.builtin.unarchive:
    src: "/tmp/alloy-{{ alloy_version }}.zip"
    dest: "/tmp/alloy-{{ alloy_version }}"
    remote_src: true

- name: Alloy バイナリ名を探す
  ansible.builtin.find:
    paths: "/tmp/alloy-{{ alloy_version }}"
    patterns: "alloy*"
    file_type: file
  register: alloy_binaries

- name: Alloy バイナリを配置する
  ansible.builtin.copy:
    src: "{{ alloy_binaries.files[0].path }}"
    dest: "{{ observe_root }}/bin/alloy"
    remote_src: true
    mode: "0755"
  when: alloy_binaries.files | length > 0

- name: Alloy 設定ディレクトリを作る
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ observe_root }}/alloy"
    - "{{ observe_root }}/data/alloy"

- name: Alloy 設定を配置する
  ansible.builtin.template:
    src: templates/observe/config.alloy.j2
    dest: "{{ observe_root }}/alloy/config.alloy"
    mode: "0644"
  notify: Alloy を再起動する

- name: Alloy の systemd を配置する
  ansible.builtin.template:
    src: templates/observe/alloy.service.j2
    dest: /etc/systemd/system/alloy.service
    mode: "0644"
  notify: Observe agent を再読み込みする

- name: Alloy を有効化して起動する
  ansible.builtin.systemd:
    name: alloy
    state: started
    enabled: true
    daemon_reload: true
