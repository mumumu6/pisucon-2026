---
- name: Docker を導入する
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present
    update_cache: true
    lock_timeout: 600
  register: observe_docker_packages
  retries: 20
  delay: 15
  until: observe_docker_packages is succeeded

- name: Docker を起動する
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: 中央スタック用ディレクトリを作る
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ observe_compose_dir }}"
    - "{{ observe_compose_dir }}/grafana/provisioning/datasources"
    - "{{ observe_compose_dir }}/grafana/provisioning/dashboards/json"
    - "{{ observe_root }}/data/prometheus"
    - "{{ observe_root }}/data/loki"
    - "{{ observe_root }}/data/grafana"

- name: Prometheus 設定を配置する
  ansible.builtin.template:
    src: templates/observe/prometheus.yml.j2
    dest: "{{ observe_compose_dir }}/prometheus.yml"
    mode: "0644"

- name: Loki 設定を配置する
  ansible.builtin.template:
    src: templates/observe/loki-config.yml.j2
    dest: "{{ observe_compose_dir }}/loki-config.yml"
    mode: "0644"

- name: Grafana datasource を配置する
  ansible.builtin.template:
    src: templates/observe/grafana-datasources.yml.j2
    dest: "{{ observe_compose_dir }}/grafana/provisioning/datasources/datasources.yml"
    mode: "0644"

- name: Grafana dashboard provider を配置する
  ansible.builtin.template:
    src: templates/observe/grafana-dashboard-provider.yml.j2
    dest: "{{ observe_compose_dir }}/grafana/provisioning/dashboards/provider.yml"
    mode: "0644"

- name: Grafana dashboard を配置する
  ansible.builtin.template:
    src: templates/observe/dashboard-overview.json.j2
    dest: "{{ observe_compose_dir }}/grafana/provisioning/dashboards/json/overview.json"
    mode: "0644"

- name: docker compose 定義を配置する
  ansible.builtin.template:
    src: templates/observe/docker-compose.yml.j2
    dest: "{{ observe_compose_dir }}/docker-compose.yml"
    mode: "0644"

- name: Prometheus データディレクトリの所有者を合わせる
  ansible.builtin.file:
    path: "{{ observe_root }}/data/prometheus"
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"
    recurse: true

- name: Grafana データディレクトリの所有者を合わせる
  ansible.builtin.file:
    path: "{{ observe_root }}/data/grafana"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"

- name: Loki データディレクトリの所有者を合わせる
  ansible.builtin.file:
    path: "{{ observe_root }}/data/loki"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
    recurse: true

- name: 中央スタックを起動する
  ansible.builtin.command:
    argv: [docker, compose, up, -d]
    chdir: "{{ observe_compose_dir }}"
  register: observe_compose_up
  changed_when: "'Started' in observe_compose_up.stderr or 'Creating' in observe_compose_up.stderr or 'Running' in observe_compose_up.stdout"
