---
# 全ホスト共通パッケージ（curl/git/jq/unzip）
- name: 共通パッケージを導入する
  ansible.builtin.apt:
    name:
      - curl
      - git
      - jq
      - unzip
    state: present
    update_cache: true
    update_cache_retries: 5
    update_cache_retry_max_delay: 12
    # 初期インスタンスは cloud-init の apt が残っていることがある
    lock_timeout: 600
  register: common_packages
  retries: 40
  delay: 15
  until: common_packages is succeeded
