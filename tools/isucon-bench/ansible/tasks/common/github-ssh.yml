---
# 全ホストへ GitHub 用デプロイ鍵を配る。秘密鍵は Git 管理せず、
# 制御ノードの ansible/files/ に置いたものを源にする。
- name: GitHub用SSH鍵の源ファイルを確認する
  ansible.builtin.stat:
    path: "{{ github_ssh_private_key_src }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: github_ssh_private_key_stat

- name: GitHub用SSH鍵の源が無いときは失敗する
  ansible.builtin.assert:
    that:
      - github_ssh_private_key_stat.stat.exists
    fail_msg: >-
      {{ github_ssh_private_key_src }} がありません。
      鍵があるホストから次でコピーしてください:
      scp {{ deploy_user }}@<host>:~/.ssh/id_ed25519 {{ github_ssh_private_key_src }}
      scp {{ deploy_user }}@<host>:~/.ssh/id_ed25519.pub {{ github_ssh_public_key_src }}
  run_once: true

- name: SSH用ディレクトリを作る
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: GitHub用秘密鍵を配置する
  ansible.builtin.copy:
    src: "{{ github_ssh_private_key_src }}"
    dest: "{{ github_ssh_identity_file }}"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"

- name: GitHub用公開鍵を配置する
  ansible.builtin.copy:
    src: "{{ github_ssh_public_key_src }}"
    dest: "{{ github_ssh_identity_file }}.pub"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"

- name: GitHub用SSH configを配置する
  ansible.builtin.template:
    src: templates/ssh-github.config.j2
    dest: "/home/{{ deploy_user }}/.ssh/config"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"

- name: github.comをknown_hostsへ登録する
  ansible.builtin.blockinfile:
    path: "/home/{{ deploy_user }}/.ssh/known_hosts"
    create: true
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED github.com"
    block: "{{ github_ssh_known_hosts }}"
