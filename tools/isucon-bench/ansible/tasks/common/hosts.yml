---
# inventory の private_ip を /etc/hosts に書き、ホスト名で相互参照できるようにする。
- name: inventory の private_ip を /etc/hosts に反映する
  become: true
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED ISUCON PRIVATE IPS"
    block: |
      {% for host in groups['all'] | sort -%}
      {% if hostvars[host].private_ip is defined -%}
      {{ hostvars[host].private_ip }} {{ host }}
      {% endif -%}
      {% endfor %}
    create: false
