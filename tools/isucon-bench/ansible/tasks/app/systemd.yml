---
# setup / deploy から共有。アプリの systemd drop-in を反映する。
# 実体は server-config/systemd/app.override.conf（bootstrap が取り込み、以後 git 管理）。
# ファイルが無いときは何もしない（素の unit のまま）。
- name: アプリのsystemd設定を反映する
  become: true
  block:
    - name: server-config の drop-in を確認する
      ansible.builtin.stat:
        path: "{{ server_config_root }}/systemd/app.override.conf"
      delegate_to: localhost
      become: false
      register: local_app_override

    - name: override 用ディレクトリを用意する
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ app_service }}.d"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: local_app_override.stat.exists

    - name: systemd drop-in を反映する
      ansible.builtin.copy:
        src: "{{ server_config_root }}/systemd/app.override.conf"
        dest: "/etc/systemd/system/{{ app_service }}.d/override.conf"
        owner: root
        group: root
        mode: "0644"
      register: app_systemd_override
      when: local_app_override.stat.exists

    - name: daemon-reload する
      ansible.builtin.systemd:
        daemon_reload: true
      when: >-
        (local_app_override.stat.exists and (app_systemd_override is changed))
        or (force_daemon_reload | default(false))
