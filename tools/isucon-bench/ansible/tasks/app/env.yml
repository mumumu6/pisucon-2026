---
# inventory から DB 接続先を決めて env.sh を置く
- name: トポロジを解決する
  ansible.builtin.include_tasks: tasks/common/topology-facts.yml

- name: env.sh を配置する
  ansible.builtin.template:
    src: templates/env.sh.j2
    dest: "{{ remote_project_root }}/env.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
    backup: true
