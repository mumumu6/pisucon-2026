---
# 例年どおりサーバーに /home/isucon/env.sh があり、systemd の EnvironmentFile が読む前提。
# Ansible は既存ファイルの MYSQL_HOST だけ inventory に合わせる（無ければ作らない）。
- name: トポロジを解決する
  ansible.builtin.include_tasks: tasks/common/topology-facts.yml

- name: env.sh の有無を確認する
  ansible.builtin.stat:
    path: "{{ remote_project_root }}/env.sh"
  register: env_sh_stat

- name: env.sh が無い場合はスキップする（例年はサーバー配布がある）
  ansible.builtin.debug:
    msg: >-
      {{ remote_project_root }}/env.sh が無いので MYSQL_HOST は触らない。
      例年はサーバー初期イメージに env.sh があり、systemd が EnvironmentFile で読む。
  when: not env_sh_stat.stat.exists

- name: 既存の env.sh の MYSQL_HOST だけ合わせる
  ansible.builtin.lineinfile:
    path: "{{ remote_project_root }}/env.sh"
    regexp: '^MYSQL_HOST='
    line: >-
      MYSQL_HOST="{{ '127.0.0.1' if (app_db_colocated | bool) else db_backend_ip }}"
    backup: true
  when: env_sh_stat.stat.exists
