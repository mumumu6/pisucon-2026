---
# 例年: サーバー配布の env.sh がある前提。あれば MYSQL_HOST だけ合わせる。
# 無ければ作らない（スキップ）。systemd 側の EnvironmentFile は override で保証する。
- name: トポロジを解決する
  ansible.builtin.include_tasks: tasks/common/topology-facts.yml

- name: env.sh の有無を確認する
  ansible.builtin.stat:
    path: "{{ remote_project_root }}/env.sh"
  register: env_sh_stat

- name: env.sh が無い場合はスキップする
  ansible.builtin.debug:
    msg: >-
      {{ remote_project_root }}/env.sh が無いのでスキップ。
      例年はサーバー初期配布がある。必要なら手動で置いてから再実行する。
  when: not env_sh_stat.stat.exists

- name: 既存の env.sh の MYSQL_HOST だけ合わせる
  ansible.builtin.lineinfile:
    path: "{{ remote_project_root }}/env.sh"
    regexp: '^MYSQL_HOST='
    line: >-
      MYSQL_HOST="{{ '127.0.0.1' if (app_db_colocated | bool) else db_backend_ip }}"
    backup: true
  when: env_sh_stat.stat.exists
