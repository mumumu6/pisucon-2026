---
# 例年: サーバー配布の env.sh + systemd EnvironmentFile。
# イレギュラー: ファイル無しでも最小生成して続行し、最後に必ず存在確認する。
- name: トポロジを解決する
  ansible.builtin.include_tasks: tasks/common/topology-facts.yml

- name: env.sh の有無を確認する
  ansible.builtin.stat:
    path: "{{ remote_project_root }}/env.sh"
  register: env_sh_stat

- name: env.sh が無ければ最小構成で作る（イレギュラー対応）
  ansible.builtin.template:
    src: templates/env.sh.j2
    dest: "{{ remote_project_root }}/env.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  when: not env_sh_stat.stat.exists

- name: 既存の env.sh は MYSQL_HOST だけ合わせる（他行は触らない）
  ansible.builtin.lineinfile:
    path: "{{ remote_project_root }}/env.sh"
    regexp: '^MYSQL_HOST='
    line: >-
      MYSQL_HOST="{{ '127.0.0.1' if (app_db_colocated | bool) else db_backend_ip }}"
    backup: true
  when: env_sh_stat.stat.exists

- name: env.sh に MYSQL_HOST があることを確認する
  ansible.builtin.command:
    argv:
      - grep
      - -E
      - ^MYSQL_HOST=
      - "{{ remote_project_root }}/env.sh"
  register: env_sh_mysql_host
  changed_when: false
  failed_when: env_sh_mysql_host.rc != 0
