---
# サーバー配布の env.sh は残し、MYSQL_HOST だけ inventory に合わせる。
# （大会固有の POST_* などはサーバー側の値を壊さない）
- name: トポロジを解決する
  ansible.builtin.include_tasks: tasks/common/topology-facts.yml

- name: MYSQL_HOST を inventory から合わせる
  ansible.builtin.lineinfile:
    path: "{{ remote_project_root }}/env.sh"
    regexp: '^MYSQL_HOST='
    line: >-
      MYSQL_HOST="{{ '127.0.0.1' if (app_db_colocated | bool) else db_backend_ip }}"
    backup: true
    create: false
