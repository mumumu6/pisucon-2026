---
# MariaDB の設定を反映する（slow log 置き場 / server-config の cnf / リモート権限）
# cnf の実体は repo の server-config/（make bootstrap が取り込み、以後 git 管理）。
# cnf が変わったときだけ末尾で再起動する（handlers は使わない）。
- name: MariaDBの設定を反映する
  block:
    - name: server-config の cnf を確認する
      ansible.builtin.stat:
        path: "{{ mysql_cnf_local }}"
      delegate_to: localhost
      become: false
      register: local_mysql_cnf

    - name: 取り込み済みか検証する
      ansible.builtin.assert:
        that: local_mysql_cnf.stat.exists
        fail_msg: "{{ mysql_cnf_local }} がありません。先に make bootstrap を実行してください。"

    - name: スローログ用の置き場を用意する
      ansible.builtin.file:
        path: "{{ slow_log | dirname }}"
        state: directory
        owner: mysql
        group: adm
        mode: "0750"

    - name: スローログファイルを用意する
      ansible.builtin.file:
        path: "{{ slow_log }}"
        state: touch
        owner: mysql
        group: adm
        mode: "0640"
        modification_time: preserve
        access_time: preserve

    - name: server-config の cnf を反映する
      ansible.builtin.copy:
        src: "{{ mysql_cnf_local }}"
        dest: "{{ mysql_server_cnf }}"
        owner: root
        group: root
        mode: "0644"
      register: mysql_cnf_result

    - name: MariaDBを再起動する
      ansible.builtin.include_tasks: tasks/common/services-restart.yml
      vars:
        service: db
      when: mysql_cnf_result is changed

    # cnf ではユーザー権限は書けない。初期は localhost だけなので '%' も許可する。
    - name: リモート接続用ユーザーを許可する
      ansible.builtin.shell: |
        set -euo pipefail
        {{ mysql_admin_command }} --execute="CREATE USER IF NOT EXISTS '{{ mysql_user }}'@'%' IDENTIFIED BY '{{ mysql_password }}'; GRANT ALL PRIVILEGES ON *.* TO '{{ mysql_user }}'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"
      args:
        executable: /bin/bash
      changed_when: true
