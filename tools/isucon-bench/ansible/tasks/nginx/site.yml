---
# サイト設定テンプレート配置 + nginx -t。再起動は restart_nginx（既定 true）
- name: Nginxのサイト設定を配置する
  ansible.builtin.template:
    src: templates/nginx.site.conf.j2
    dest: "{{ nginx_conf_dest }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true

- name: Nginx設定を検証する
  ansible.builtin.command:
    argv: [nginx, -t]
  become: true
  changed_when: false

- name: Nginxを再起動する
  ansible.builtin.include_tasks: tasks/nginx/restart.yml
  when: restart_nginx | default(true)
