---
# サイト設定だけ載せ替えたいとき用（configure.yml の一部と同じ）
- name: Nginxのサイト設定を反映する
  become: true
  block:
    - name: サイト設定を反映する
      ansible.builtin.template:
        src: templates/nginx.site.conf.j2
        dest: "{{ nginx_conf_dest }}"
        owner: root
        group: root
        mode: "0644"
        backup: true

    - name: nginx -t で検証する
      ansible.builtin.command:
        argv: [nginx, -t]
      changed_when: false

    - name: Nginxを再起動する
      ansible.builtin.include_tasks: tasks/nginx/restart.yml
      when: restart_nginx | default(true)
