---
# Nginx 設定を反映する。
# nginx_config_scope: full（既定）= systemd drop-in + 既定サイト削除 + nginx.conf
#                     site       = nginx.conf のみ（make deploy 用）
# 再起動は末尾で1回だけ（handlers は使わない）。
- name: Nginxの設定を反映する
  become: true
  block:
    - name: トポロジを解決する
      ansible.builtin.include_tasks: tasks/common/topology-facts.yml

    - name: systemd drop-in 用ディレクトリを用意する
      ansible.builtin.file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: (nginx_config_scope | default('full')) == 'full'

    - name: systemd drop-in を反映する
      ansible.builtin.template:
        src: templates/nginx.service-override.conf.j2
        dest: /etc/systemd/system/nginx.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
        backup: true
      when: (nginx_config_scope | default('full')) == 'full'

    - name: 既定サイトを外す
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      when: (nginx_config_scope | default('full')) == 'full'

    - name: nginx.conf を反映する
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: "{{ nginx_conf_dest }}"
        owner: root
        group: root
        mode: "0644"
        backup: true

    - name: nginx -t で検証する
      ansible.builtin.command:
        argv: [nginx, -t]
      changed_when: false

    - name: Nginxを再起動する
      ansible.builtin.include_tasks: tasks/common/services-restart.yml
      vars:
        service: nginx
      when: restart_nginx | default(true)
