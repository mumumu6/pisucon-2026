---
# make bootstrap の最初に呼ぶ。サーバーの素を repo へ取り込み commit / push する。
# 取り込み済みなら触らない。壊れたら手で rsync / scp して git add すればよい。
#
#   rsync -a isucon@<app>:~/webapp/go/ ./webapp/go/ --exclude node_modules --exclude <app_name>
#   rsync -a isucon@<app>:~/webapp/sql/ ./webapp/sql/
#   rsync -a isucon@<app>:~/webapp/frontend/ ./webapp/frontend/ --exclude node_modules
#   scp isucon@<app>:~/env.sh ./env.sh
#
- name: Nginx設定を取り込む
  hosts: nginx[0]
  become: true
  gather_facts: false
  tasks:
    - name: 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ server_config_root }}/nginx.conf"
      delegate_to: localhost
      become: false
      register: pulled_nginx_conf

    - name: nginx.conf / サイト / drop-in を取り込む
      when: not pulled_nginx_conf.stat.exists
      block:
        - name: サーバー側に .orig を残す
          ansible.builtin.copy:
            src: "{{ nginx_conf_dest }}"
            dest: "{{ nginx_conf_dest }}.orig"
            remote_src: true
            force: false
            mode: preserve

        - name: 手元の置き場を作る
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
          loop:
            - "{{ server_config_root }}/sites"
            - "{{ server_config_root }}/systemd"
          delegate_to: localhost
          become: false

        - name: nginx.conf を取る
          ansible.builtin.fetch:
            src: "{{ nginx_conf_dest }}"
            dest: "{{ server_config_root }}/nginx.conf"
            flat: true

        - name: サイト設定を取る
          ansible.posix.synchronize:
            mode: pull
            src: "{{ nginx_sites_dir }}/"
            dest: "{{ server_config_root }}/sites/"
            archive: true

        - name: drop-in があれば取る
          ansible.builtin.stat:
            path: /etc/systemd/system/nginx.service.d/override.conf
          register: remote_nginx_override

        - name: nginx drop-in を取る
          ansible.builtin.fetch:
            src: /etc/systemd/system/nginx.service.d/override.conf
            dest: "{{ server_config_root }}/systemd/nginx.override.conf"
            flat: true
          when: remote_nginx_override.stat.exists | default(false)

- name: アプリ設定と webapp を取り込む
  hosts: app[0]
  become: false
  gather_facts: false
  tasks:
    - name: app drop-in 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ server_config_root }}/systemd/app.override.conf"
      delegate_to: localhost
      register: pulled_app_override

    - name: app drop-in があれば取る
      when: not pulled_app_override.stat.exists
      block:
        - name: 有無を確認する
          ansible.builtin.stat:
            path: "/etc/systemd/system/{{ app_service }}.d/override.conf"
          become: true
          register: remote_app_override

        - name: 置き場を作る
          ansible.builtin.file:
            path: "{{ server_config_root }}/systemd"
            state: directory
          delegate_to: localhost
          when: remote_app_override.stat.exists | default(false)

        - name: drop-in を取る
          ansible.builtin.fetch:
            src: "/etc/systemd/system/{{ app_service }}.d/override.conf"
            dest: "{{ server_config_root }}/systemd/app.override.conf"
            flat: true
          become: true
          when: remote_app_override.stat.exists | default(false)

    - name: webapp 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ repo_root }}/webapp/go"
      delegate_to: localhost
      register: pulled_webapp

    - name: webapp/go・sql・frontend と env.sh を rsync する
      when: not pulled_webapp.stat.exists
      ansible.posix.synchronize:
        mode: pull
        src: "{{ remote_project_root }}/{{ item }}"
        dest: "{{ repo_root }}/{{ item }}"
        archive: true
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude={{ app_name }}"
      loop: "{{ project_seed_paths }}"

- name: MariaDB設定を取り込む
  hosts: db[0]
  become: true
  gather_facts: false
  tasks:
    - name: 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ mysql_cnf_local }}"
      delegate_to: localhost
      become: false
      register: pulled_mysql_cnf

    - name: DB cnf を取り込む
      when: not pulled_mysql_cnf.stat.exists
      block:
        - name: サーバー側に .orig を残す
          ansible.builtin.copy:
            src: "{{ mysql_server_cnf }}"
            dest: "{{ mysql_server_cnf }}.orig"
            remote_src: true
            force: false
            mode: preserve

        - name: 置き場を作る
          ansible.builtin.file:
            path: "{{ server_config_root }}"
            state: directory
          delegate_to: localhost
          become: false

        - name: cnf を取る
          ansible.builtin.fetch:
            src: "{{ mysql_server_cnf }}"
            dest: "{{ mysql_cnf_local }}"
            flat: true

- name: 配線を書いて commit / push する
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    nginx_pulled_now: "{{ not (hostvars[groups['nginx'][0]].pulled_nginx_conf.stat.exists | default(true)) }}"
    mysql_pulled_now: "{{ not (hostvars[groups['db'][0]].pulled_mysql_cnf.stat.exists | default(true)) }}"
    webapp_pulled_now: "{{ not (hostvars[groups['app'][0]].pulled_webapp.stat.exists | default(true)) }}"
  tasks:
    - name: 素の server-config を commit する
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ repo_root }}"
        git add -A -- server-config
        if git diff --cached --quiet -- server-config; then
          echo unchanged
        else
          git commit -m "server-config: サーバーの素の設定を取り込み" -- server-config
          echo committed
        fi
      args:
        executable: /bin/bash
      register: pristine_commit
      changed_when: "'committed' in pristine_commit.stdout"

    - name: nginx.conf に配線を書く
      when: nginx_pulled_now | bool
      block:
        - name: ltsv の有無
          ansible.builtin.command:
            argv: [grep, -q, "log_format ltsv", "{{ server_config_root }}/nginx.conf"]
          register: nginx_ltsv_check
          changed_when: false
          failed_when: nginx_ltsv_check.rc not in [0, 1]

        - name: 配線とチューニング候補を追記する
          when: nginx_ltsv_check.rc != 0
          vars:
            wiring_dir: "{{ playbook_dir }}/files/wiring"
          block:
            - ansible.builtin.blockinfile:
                path: "{{ server_config_root }}/nginx.conf"
                marker: "# {mark} isucon-bench: main"
                insertbefore: '^events\s*\{'
                block: "{{ lookup('file', wiring_dir ~ '/nginx-main.conf') }}"

            - ansible.builtin.blockinfile:
                path: "{{ server_config_root }}/nginx.conf"
                marker: "    # {mark} isucon-bench: events"
                insertafter: '^events\s*\{'
                block: "{{ lookup('file', wiring_dir ~ '/nginx-events.conf') | indent(4, true) }}"

            - ansible.builtin.blockinfile:
                path: "{{ server_config_root }}/nginx.conf"
                marker: "    # {mark} isucon-bench: http"
                insertafter: '^http\s*\{'
                block: "{{ lookup('template', wiring_dir ~ '/nginx-http.conf.j2') | indent(4, true) }}"

            - ansible.builtin.replace:
                path: "{{ server_config_root }}/nginx.conf"
                regexp: '^(\s*access_log\s+{{ access_log | regex_escape() }})(\s+\w+)?\s*;'
                replace: '\1 ltsv;'

    - name: DB cnf に配線を書く
      when: mysql_pulled_now | bool
      ansible.builtin.blockinfile:
        path: "{{ mysql_cnf_local }}"
        marker: "# {mark} isucon-bench"
        block: "{{ lookup('template', playbook_dir ~ '/files/wiring/mysql.cnf.j2') }}"

    - name: server-config を commit する
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ repo_root }}"
        git add -A -- server-config
        if git diff --cached --quiet -- server-config; then
          echo unchanged
        else
          git commit -m "server-config: 計測用の配線とチューニング候補を追記" -- server-config
          echo committed
        fi
      args:
        executable: /bin/bash
      register: wiring_commit
      changed_when: "'committed' in wiring_commit.stdout"

    - name: webapp を commit する
      when: webapp_pulled_now | bool
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ repo_root }}"
        git add -A -- {{ project_seed_paths | map('quote') | join(' ') }}
        if git diff --cached --quiet; then
          echo unchanged
        else
          git commit -m "project: サーバーの素の webapp / env を取り込み"
          echo committed
        fi
      args:
        executable: /bin/bash
      register: project_commit
      changed_when: "'committed' in project_commit.stdout"

    - name: push する
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ repo_root }}"
        git push origin "{{ git_version }}" \
          || git push "{{ git_repository }}" "HEAD:refs/heads/{{ git_version }}" \
          || echo "[warn] git push に失敗しました。手動で push してください。"
      args:
        executable: /bin/bash
      changed_when: false
