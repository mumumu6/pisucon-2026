---
# make bootstrap の最初に呼ぶ。サーバーの素の設定を repo の server-config/ へ取り込み、
# files/wiring/ の配線・チューニング候補を書き足して commit / push する。
# 取り込み済みのファイルには一切触らない（手元の編集を上書きしない）。
#
# git 履歴: 「素の状態」→「計測の配線」の2コミットが積まれる。
# 以後は server-config/ を直接編集し make deploy / make mysql-tune で反映する。
# 初回追記の中身を変えたいときは files/wiring/ を編集する。
- name: Nginx設定を取り込む
  hosts: nginx[0]
  become: true
  gather_facts: false
  tasks:
    - name: 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ server_config_root }}/nginx.conf"
      delegate_to: localhost
      become: false
      register: pulled_nginx_conf

    - name: nginx.conf とサイト設定を取り込む
      when: not pulled_nginx_conf.stat.exists
      block:
        - name: サーバー側に .orig を残す
          ansible.builtin.copy:
            src: "{{ nginx_conf_dest }}"
            dest: "{{ nginx_conf_dest }}.orig"
            remote_src: true
            force: false
            mode: preserve

        - name: nginx.conf を手元へ取得する
          ansible.builtin.fetch:
            src: "{{ nginx_conf_dest }}"
            dest: "{{ server_config_root }}/nginx.conf"
            flat: true

        - name: サイト設定を探す
          ansible.builtin.find:
            paths: "{{ nginx_sites_dir }}"
            file_type: any
          register: nginx_site_files

        - name: サイト設定を手元へ取得する
          ansible.builtin.fetch:
            src: "{{ item.path }}"
            dest: "{{ server_config_root }}/sites/{{ item.path | basename }}"
            flat: true
          loop: "{{ nginx_site_files.files }}"
          loop_control:
            label: "{{ item.path }}"

    - name: nginx systemd drop-in の取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ server_config_root }}/systemd/nginx.override.conf"
      delegate_to: localhost
      become: false
      register: pulled_nginx_override

    - name: nginx systemd drop-in を取り込む（サーバーにあるときだけ。無ければ作らない）
      when: not pulled_nginx_override.stat.exists
      block:
        - name: サーバー上の有無を確認する
          ansible.builtin.stat:
            path: /etc/systemd/system/nginx.service.d/override.conf
          register: remote_nginx_override

        - name: nginx systemd drop-in を手元へ取得する
          ansible.builtin.fetch:
            src: /etc/systemd/system/nginx.service.d/override.conf
            dest: "{{ server_config_root }}/systemd/nginx.override.conf"
            flat: true
          when: remote_nginx_override.stat.exists | default(false)

- name: アプリ systemd drop-in を取り込む
  hosts: app[0]
  become: true
  gather_facts: false
  tasks:
    - name: 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ server_config_root }}/systemd/app.override.conf"
      delegate_to: localhost
      become: false
      register: pulled_app_override

    - name: アプリ systemd drop-in を取り込む（サーバーにあるときだけ。無ければ作らない）
      when: not pulled_app_override.stat.exists
      block:
        - name: サーバー上の有無を確認する
          ansible.builtin.stat:
            path: "/etc/systemd/system/{{ app_service }}.d/override.conf"
          register: remote_app_override

        - name: アプリ systemd drop-in を手元へ取得する
          ansible.builtin.fetch:
            src: "/etc/systemd/system/{{ app_service }}.d/override.conf"
            dest: "{{ server_config_root }}/systemd/app.override.conf"
            flat: true
          when: remote_app_override.stat.exists | default(false)

- name: MariaDB設定を取り込む
  hosts: db[0]
  become: true
  gather_facts: false
  tasks:
    - name: 取り込み済みか確認する
      ansible.builtin.stat:
        path: "{{ mysql_cnf_local }}"
      delegate_to: localhost
      become: false
      register: pulled_mysql_cnf

    - name: DB cnf を取り込む
      when: not pulled_mysql_cnf.stat.exists
      block:
        - name: サーバー側に .orig を残す
          ansible.builtin.copy:
            src: "{{ mysql_server_cnf }}"
            dest: "{{ mysql_server_cnf }}.orig"
            remote_src: true
            force: false
            mode: preserve

        - name: DB cnf を手元へ取得する
          ansible.builtin.fetch:
            src: "{{ mysql_server_cnf }}"
            dest: "{{ mysql_cnf_local }}"
            flat: true

- name: 配線を書き足して commit する
  hosts: nginx[0]
  gather_facts: false
  become: false
  vars:
    nginx_pulled_now: "{{ not pulled_nginx_conf.stat.exists }}"
    mysql_pulled_now: "{{ not hostvars[groups['db'][0]].pulled_mysql_cnf.stat.exists }}"
  tasks:
    - name: 素の状態を commit する
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ repo_root }}"
        git add -A -- server-config
        if git diff --cached --quiet -- server-config; then
          echo unchanged
        else
          git commit -m "server-config: サーバーの素の設定を取り込み" -- server-config
          echo committed
        fi
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: pristine_commit
      changed_when: "'committed' in pristine_commit.stdout"

    - name: nginx.conf に配線を書き足す
      when: nginx_pulled_now | bool
      delegate_to: localhost
      block:
        - name: ltsv 設定の有無を確認する
          ansible.builtin.command:
            argv: [grep, -q, "log_format ltsv", "{{ server_config_root }}/nginx.conf"]
          register: nginx_ltsv_check
          changed_when: false
          failed_when: nginx_ltsv_check.rc not in [0, 1]

        - name: 配線とチューニング候補を書き足す
          when: nginx_ltsv_check.rc != 0
          vars:
            wiring_dir: "{{ playbook_dir }}/files/wiring"
          block:
            - name: 全体チューニング候補を追記する
              ansible.builtin.blockinfile:
                path: "{{ server_config_root }}/nginx.conf"
                marker: "# {mark} isucon-bench: main"
                insertbefore: '^events\s*\{'
                block: "{{ lookup('file', wiring_dir ~ '/nginx-main.conf') }}"

            - name: events チューニング候補を追記する
              ansible.builtin.blockinfile:
                path: "{{ server_config_root }}/nginx.conf"
                marker: "    # {mark} isucon-bench: events"
                insertafter: '^events\s*\{'
                block: "{{ lookup('file', wiring_dir ~ '/nginx-events.conf') | indent(4, true) }}"

            - name: ltsv 配線と http チューニング候補を追記する
              ansible.builtin.blockinfile:
                path: "{{ server_config_root }}/nginx.conf"
                marker: "    # {mark} isucon-bench: http"
                insertafter: '^http\s*\{'
                block: "{{ lookup('template', wiring_dir ~ '/nginx-http.conf.j2') | indent(4, true) }}"

            - name: access_log を ltsv 形式にする
              ansible.builtin.replace:
                path: "{{ server_config_root }}/nginx.conf"
                # 「access_log <パス>;」「access_log <パス> main;」の両方を ltsv に置き換える
                regexp: '^(\s*access_log\s+{{ access_log | regex_escape() }})(\s+\w+)?\s*;'
                replace: '\1 ltsv;'

    - name: DB cnf に配線を書き足す
      when: mysql_pulled_now | bool
      delegate_to: localhost
      ansible.builtin.blockinfile:
        path: "{{ mysql_cnf_local }}"
        marker: "# {mark} isucon-bench"
        block: "{{ lookup('template', playbook_dir ~ '/files/wiring/mysql.cnf.j2') }}"

    - name: 配線を commit して push する
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ repo_root }}"
        git add -A -- server-config
        if git diff --cached --quiet -- server-config; then
          echo unchanged
        else
          git commit -m "server-config: 計測用の配線とチューニング候補を追記" -- server-config
          echo committed
        fi
        git push || echo "[warn] git push に失敗しました。手動で push してください。"
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: wiring_commit
      changed_when: "'committed' in wiring_commit.stdout"
