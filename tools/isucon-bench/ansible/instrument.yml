---
- name: Manage Go pprof instrumentation on application hosts
  hosts: app
  gather_facts: false
  vars:
    pprof_source_dir: "{{ remote_project_root }}/{{ pprof_go_dir | regex_replace('/+$', '') }}"
    pprof_source_path: "{{ pprof_source_dir }}/zz_isucon_bench_pprof.go"
  pre_tasks:
    - name: Validate instrumentation settings
      ansible.builtin.assert:
        that:
          - instrument_state in ['on', 'off']
          - pprof_go_dir | length > 0
          - not pprof_go_dir.startswith('/')
          - pprof_go_dir is not search('(^|/)\.\.(/|$)')
          - pprof_listen_addr is match('^(127\.0\.0\.1|\[::1\]):[0-9]+$')
          - remote_project_root is defined
        fail_msg: >-
          pprof_go_dir must be a safe path below remote_project_root and
          pprof_listen_addr must bind to localhost

    - name: Inspect an existing generated source file
      ansible.builtin.stat:
        path: "{{ pprof_source_path }}"
      register: existing_pprof_source

    - name: Read an existing generated source file
      ansible.builtin.slurp:
        src: "{{ pprof_source_path }}"
      register: existing_pprof_content
      when: existing_pprof_source.stat.exists

    - name: Refuse to overwrite an unrelated source file
      ansible.builtin.assert:
        that: >-
          'Code generated by isucon-bench' in
          (existing_pprof_content.content | b64decode)
        fail_msg: "Refusing to modify unrelated file: {{ pprof_source_path }}"
      when: existing_pprof_source.stat.exists

  tasks:
    - name: Find Go source files in the target package
      ansible.builtin.find:
        paths: "{{ pprof_source_dir }}"
        patterns: "*.go"
        file_type: file
        recurse: false
        excludes: zz_isucon_bench_pprof.go
      register: go_source_files
      when: instrument_state == 'on'

    - name: Require an existing Go package
      ansible.builtin.assert:
        that: go_source_files.files | length > 0
        fail_msg: "No Go source files found below {{ pprof_source_dir }}"
      when: instrument_state == 'on'

    - name: Read the Go package name
      ansible.builtin.command:
        argv:
          - awk
          - '/^package[[:space:]]+/ { print $2; exit }'
          - "{{ (go_source_files.files | first).path }}"
      register: go_package_name
      changed_when: false
      when: instrument_state == 'on'

    - name: Validate the Go package name
      ansible.builtin.assert:
        that: go_package_name.stdout is match('^[A-Za-z_][A-Za-z0-9_]*$')
        fail_msg: "Could not determine the Go package below {{ pprof_source_dir }}"
      when: instrument_state == 'on'

    - name: Install isolated pprof instrumentation
      ansible.builtin.template:
        src: templates/pprof.go.j2
        dest: "{{ pprof_source_path }}"
        mode: "0644"
      vars:
        pprof_package_name: "{{ go_package_name.stdout }}"
      register: instrument_on_result
      when: instrument_state == 'on'

    - name: Remove isolated pprof instrumentation
      ansible.builtin.file:
        path: "{{ pprof_source_path }}"
        state: absent
      register: instrument_off_result
      when: instrument_state == 'off'

    - name: Build the application after instrumentation changes
      ansible.builtin.command:
        argv: [/bin/bash, -lc, "{{ build_command }}"]
        chdir: "{{ remote_project_root }}"
      changed_when: true
      when:
        - build_command | length > 0
        - instrument_on_result.changed | default(false) or instrument_off_result.changed | default(false)

    - name: Restart the application after instrumentation changes
      ansible.builtin.command:
        argv: [/bin/bash, -lc, "{{ restart_command }}"]
        chdir: "{{ remote_project_root }}"
      changed_when: true
      when:
        - restart_command | length > 0
        - instrument_on_result.changed | default(false) or instrument_off_result.changed | default(false)
