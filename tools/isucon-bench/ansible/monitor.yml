---
# monitor_state: on | off
- name: 計測系を切り替える
  hosts: all
  gather_facts: false
  tasks:
    - name: Netdataを制御する
      become: true
      ansible.builtin.systemd:
        name: "{{ netdata_service }}"
        state: "{{ 'started' if monitor_state | bool else 'stopped' }}"
        enabled: "{{ monitor_state | bool }}"
      when: netdata_enabled | bool

    - name: スロークエリログを制御する
      become: true
      ansible.builtin.command:
        argv:
          - "{{ mysql_admin_command }}"
          - >-
            --execute={% if monitor_state | bool %}SET GLOBAL long_query_time={{ mysql_slow_query_time }}; SET GLOBAL slow_query_log=1;{% else %}SET GLOBAL slow_query_log=0;{% endif %}
      changed_when: true
      when: inventory_hostname in groups.get('db', [])

    - name: アプリをビルドする
      ansible.builtin.include_tasks: tasks/app/build.yml

    - name: サービスを再起動する
      ansible.builtin.include_tasks: tasks/common/restart.yml
