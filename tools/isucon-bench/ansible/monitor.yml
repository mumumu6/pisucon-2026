---
# monitor_state: on | off
# observe (Grafana/Prometheus/Loki) / slow query / pprof をまとめて切り替える
- name: 計測系を切り替える
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: monitor_state を検証する
      ansible.builtin.assert:
        that: >-
          (monitor_state | string | lower) in
          ['on', 'off', 'true', 'false', 'yes', 'no', '1', '0']
        fail_msg: "monitor_state must be on/off (string or bool)"
      run_once: true

  tasks:
    - name: 計測系を切り替える
      ansible.builtin.include_tasks: tasks/monitor/toggle.yml
