user  www-data;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;


# BEGIN isucon-bench: main
# ---- チューニング: worker あたりの fd 上限。worker_connections を増やすならセットで外す ----
# worker_rlimit_nofile 65535;
# END isucon-bench: main
events {
    # BEGIN isucon-bench: events
    # ---- チューニング: worker あたりの同時接続数（既定 768）。並列が増えて足りなくなったら外す ----
    # worker_connections 65535;
    # ---- チューニング: accept を一度に複数処理（接続ラッシュに強くなる）----
    # multi_accept on;
    # END isucon-bench: events
    worker_connections  1024;
}


http {
    # BEGIN isucon-bench: http
    # ---- 配線: alp 用 ltsv ログ（消すと make bench の解析が壊れる）----
    log_format ltsv "time:$time_local"
                    "\thost:$remote_addr"
                    "\tforwardedfor:$http_x_forwarded_for"
                    "\treq:$request"
                    "\tstatus:$status"
                    "\tmethod:$request_method"
                    "\turi:$request_uri"
                    "\tsize:$body_bytes_sent"
                    "\treferer:$http_referer"
                    "\tua:$http_user_agent"
                    "\treqtime:$request_time"
                    "\tapptime:$upstream_response_time"
                    "\tvhost:$host";

    # ---- チューニング: nginx→app のコネクション使い回し ----
    # サイト設定側の proxy_pass を upstream 名に変え、以下を有効にする。
    # proxy_http_version 1.1; proxy_set_header Connection ""; もセットで必要。
    # unix socket 化はさらに速い（app 側 override.conf の SERVER_APP_SOCK とセット）。
    # upstream app {
    #     server 127.0.0.1:3000;
    #     # server unix:/run/isucondition/isucondition.sock;
    #     keepalive 256;
    # }

    # ---- チューニング: JSON レスポンス圧縮（帯域ネックのとき。CPU とトレード）----
    # gzip on;
    # gzip_comp_level 1;
    # gzip_min_length 1024;
    # gzip_types application/json;
    # gzip_vary on;

    # ---- チューニング: 大きい POST ボディをメモリで受ける（ディスク書き込み回避）----
    # client_body_buffer_size 256k;

    # ---- チューニング: 静的ファイルのブラウザキャッシュはサイト設定の server ブロック側で ----
    # location ^~ /assets/ { access_log off; expires 1y; add_header Cache-Control "public, immutable"; }
    # END isucon-bench: http
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log ltsv;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*.conf;
}
