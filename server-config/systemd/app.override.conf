[Service]
# ---- 配線: fd 上限（大量接続時の accept 失敗防止。害がないので常時有効）----
LimitNOFILE=65535
# ---- 配線: unix socket 用の /run ディレクトリ（socket 化しない間も無害）----
RuntimeDirectory=isucondition
RuntimeDirectoryMode=0755

# ---- チューニング: nginx→app を unix socket 化（TCP より速い）----
# nginx 側（server-config/ の proxy_pass / upstream）も unix:/run/isucondition/isucondition.sock に変えること
# Environment=SERVER_APP_SOCK=/run/isucondition/isucondition.sock

# ---- チューニング: nginx と app を別ホストに分離したときの TCP 待受ポート ----
# nginx 側の proxy_pass / upstream を app ホストの private_ip:3000 に変えること
# Environment=SERVER_APP_PORT=3000

# ---- チューニング: GC 頻度を 1/4 に（CPU をアプリ処理に回す。メモリ使用量は増える）----
# Environment=GOGC=400
# ---- チューニング: GOGC とセットで OOM を防ぐ上限。app 機の空きメモリに合わせる ----
# Environment=GOMEMLIMIT=2GiB
